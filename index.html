<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabyBlog - Final Mobile</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #ffffff; 
            font-family: sans-serif; touch-action: none; 
        }
        
        #main-container { width: 100vw; height: 100vh; position: relative; }

        .slide { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh; 
            display: none; box-sizing: border-box; 
            padding: 80px;
            /* Permet de lire les textes longs sans changer de page */
            overflow-y: auto; 
            touch-action: pan-y; /* Autorise le scroll vertical interne sur mobile */
        }

        .slide.active { display: flex; } 

        .nav-arrow { 
            position: fixed; background: rgba(255, 255, 255, 0.6); 
            border: none; font-size: 40px; color: #000000 !important; 
            opacity: 0.2; z-index: 100; display: none; 
            align-items: center; justify-content: center; 
            width: 60px; height: 60px; border-radius: 50%;
        }
        
        .nav-arrow.visible { display: flex; }
        
        .arrow-up { top: 15px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 15px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 15px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 15px; top: 50%; transform: translateY(-50%); }
        
        .content { 
            max-width: 1100px; width: 100%; line-height: 1.6; 
            font-size: 1.2rem;
            /* Gestion des sauts de ligne et du texte */
            white-space: pre-wrap; 
            word-wrap: break-word;
        }

        @media (max-width: 768px) {
            .slide { padding: 80px 25px; }
            .content { font-size: 1.1rem; }
            .nav-arrow { width: 70px; height: 70px; opacity: 0.4; }
        }
    </style>
</head>
<body>

<button id="v-up" class="nav-arrow arrow-up" onclick="moveDir(-1, 0)">▲</button>
<button id="v-down" class="nav-arrow arrow-down" onclick="moveDir(1, 0)">▼</button>
<button id="h-left" class="nav-arrow arrow-left" onclick="moveDir(0, -1)">◀</button>
<button id="h-right" class="nav-arrow arrow-right" onclick="moveDir(0, 1)">▶</button>

<div id="main-container"></div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";
    let globalMatrix = [];
    let currentR = 0, currentC = 0;

    // GESTION DU SWIPE
    let touchstartX = 0, touchstartY = 0;
    window.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
        touchstartY = e.changedTouches[0].screenY;
    }, {passive: true});

    window.addEventListener('touchend', e => {
        handleGesture(e.changedTouches[0].screenX, e.changedTouches[0].screenY);
    }, {passive: true});

    function handleGesture(endX, endY) {
        const dx = endX - touchstartX;
        const dy = endY - touchstartY;
        const threshold = 70; // Sensibilité du swipe

        if (Math.abs(dx) > Math.abs(dy)) {
            if (Math.abs(dx) > threshold) dx > 0 ? moveDir(0, -1) : moveDir(0, 1);
        } else {
            // Si le texte est scrollable, on ne change de page que si on est au bord
            const activeSlide = document.querySelector('.slide.active');
            const isAtTop = activeSlide.scrollTop <= 0;
            const isAtBottom = activeSlide.scrollTop + activeSlide.clientHeight >= activeSlide.scrollHeight - 1;

            if (Math.abs(dy) > threshold) {
                if (dy > 0 && isAtTop) moveDir(-1, 0);
                else if (dy < 0 && isAtBottom) moveDir(1, 0);
            }
        }
    }

    async function load() {
        try {
            const res = await fetch(PROXY_URL);
            globalMatrix = await res.json();
            render();
        } catch (e) { console.error("Erreur:", e); }
    }

    function moveDir(r, c) {
        const nextR = currentR + r;
        const nextC = currentC + c;
        if (globalMatrix[nextR] && globalMatrix[nextR][nextC]) {
            document.querySelector('.slide.active').classList.remove('active');
            currentR = nextR; currentC = nextC;
            const nextSlide = document.getElementById(`s-${currentR}-${currentC}`);
            nextSlide.classList.add('active');
            nextSlide.scrollTop = 0; // Remet le texte en haut lors du changement
            updateArrows(currentR, currentC);
        }
    }

    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell) {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    if (rIdx === 0 && cIdx === 0) slide.classList.add('active');
                    slide.id = `s-${rIdx}-${cIdx}`;
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    // Correction des sauts de ligne
                    contentDiv.innerHTML = cell.htmlContent.replace(/\n/g, '<br>');
                    
                    slide.style.backgroundColor = cell.backgroundColor;
                    const hA = (cell.horizontalAlignment || "").toUpperCase();
                    const vA = (cell.verticalAlignment || "").toUpperCase();
                    slide.style.justifyContent = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "flex-end" : "flex-start";
                    slide.style.alignItems = vA.includes("MIDDLE") ? "center" : vA.includes("BOTTOM") ? "flex-end" : "flex-start";
                    contentDiv.style.textAlign = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "right" : "left";
                    
                    slide.appendChild(contentDiv);
                    container.appendChild(slide);
                }
            });
        });
        updateArrows(0, 0);
    }

    function updateArrows(r, c) {
        const hasCell = (row, col) => {
            if (row < 0 || col < 0) return false;
            return globalMatrix[row] && globalMatrix[row][col] !== null;
        };
        const config = {'v-up': hasCell(r-1,c), 'v-down': hasCell(r+1,c), 'h-left': hasCell(r,c-1), 'h-right': hasCell(r,c+1)};
        for (let id in config) {
            const btn = document.getElementById(id);
            btn.style.display = config[id] ? 'flex' : 'none';
            config[id] ? btn.classList.add('visible') : btn.classList.remove('visible');
        }
    }

    load();
</script>
</body>
</html>
