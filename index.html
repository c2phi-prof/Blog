<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabyBlog v4.5.0 - Pure Markdown Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #eeeeee; --text: #333; --accent: #FFD700; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: 'Inter', sans-serif; touch-action: none; }
        #main-container { width: 100vw; height: 100vh; position: relative; z-index: 1; }
        #system-panel { position: fixed; top: 0; left: -100vw; width: 100vw; height: 100vh; background: #fcfcfc; z-index: 1000; transition: left 0.3s ease; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #system-panel.open { left: 0; }
        .system-tools { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; margin-bottom: 20px; }
        #matrix-minimap { display: grid; gap: 2px; background: #eee; border: 1px solid #ddd; padding: 4px; width: fit-content; }
        .map-dot { width: 14px; height: 14px; background-color: #fff; border-radius: 1px; }
        .map-dot.occupied { background-color: #bbb; cursor: pointer; }
        .map-dot.current { background-color: var(--text); }
        .tool-btn { width: 45px; height: 45px; background: #fff; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: #777; }
        .tool-btn.active { color: #000; border-color: #000; background: #f0f0f0; }
        #outline-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; border-top: 1px solid #eee; padding-top: 10px; }
        .outline-item { cursor: pointer; padding: 12px; border-left: 2px solid #eee; background: #f9f9f9; font-size: 0.8rem; color: #666; }
        .outline-item.active { border-left-color: #000; background: #fff; color: #000; font-weight: bold; }
        #hud-minimap { position: fixed; bottom: 20px; right: 20px; z-index: 500; pointer-events: none; opacity: 0; transition: opacity 0.3s; background: rgba(255,255,255,0.6); padding: 4px; border: 1px solid #ddd; }
        #hud-minimap.visible { opacity: 0.4; }
        .slide { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; box-sizing: border-box; padding: 40px; overflow-y: auto; }
        .slide.active { display: flex; justify-content: center; align-items: center; } 
        .content { width: 100%; line-height: 1.6; font-size: 1.2rem; outline: none; text-align: center; font-family: 'Inconsolata', monospace; color: var(--text); }
        .content.editing { background-color: rgba(255,255,255,0.8); padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .nav-arrow { position: fixed; background: rgba(255, 255, 255, 0.3); border: none; font-size: 40px; color: #000; z-index: 100; display: none; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 50%; opacity: 0; transition: opacity 0.8s ease; }
        .nav-arrow.visible { display: flex; opacity: 0.15; } 
        .arrow-up { top: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 10px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 10px; top: 50%; transform: translateY(-50%); }
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.2s ease; }
        #progress-line { height: 1px; background: #000; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body>
<div id="loader"><div style="width:300px; background:#eee; height:1px;"><div id="progress-line"></div></div></div>
<div id="hud-minimap"></div>
<div id="system-panel">
    <div class="system-header">
        <div style="display:flex; justify-content: space-between; align-items: flex-start;">
            <div id="matrix-minimap"></div>
            <button class="tool-btn" id="close-sys" style="border-radius: 50%;">✕</button>
        </div>
        <div class="system-tools">
            <button class="tool-btn" id="btn-edit">✎</button>
            <button class="tool-btn" id="btn-undo">⎌</button>
            <button class="tool-btn" id="btn-exp-mat">⭳</button>
            <button class="tool-btn" id="btn-exp-log">◷</button>
            <button class="tool-btn" id="btn-imp">⭱</button>
            <button class="tool-btn" id="btn-retro">◈</button>
            <input type="file" id="import-input" style="display:none">
        </div>
    </div>
    <div id="outline-content"></div>
</div>
<button id="v-up" class="nav-arrow arrow-up">▲</button>
<button id="v-down" class="nav-arrow arrow-down">▼</button>
<button id="h-left" class="nav-arrow arrow-left">◀</button>
<button id="h-right" class="nav-arrow arrow-right">▶</button>
<div id="main-container"></div>

<script>
    const HTML_VERSION = "4.5.0";
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";
    let globalMatrix = [], currentSheetName = "", currentR = 0, currentC = 0;
    let clickCount = 0, clickTimer = null, lastTapTime = 0, isEditMode = false, moveHistory = [], undoStack = [];

    marked.setOptions({ gfm: true, breaks: true });

    function updateArrows(r, c) {
        const has = (row, col) => globalMatrix[row] && globalMatrix[row][col];
        const cfg = {'v-up': has(r-1,c), 'v-down': has(r+1,c), 'h-left': has(r,c-1), 'h-right': has(r,c+1)};
        for (let id in cfg) { 
            const btn = document.getElementById(id);
            if(btn) { btn.dataset.exists = !!cfg[id]; btn.style.display = 'flex'; btn.style.opacity = cfg[id] ? "0.15" : "0.02"; }
        }
        const arrows = document.querySelectorAll('.nav-arrow');
        arrows.forEach(a => a.classList.add('visible'));
        clearTimeout(window.arrowTimer);
        window.arrowTimer = setTimeout(() => { arrows.forEach(a => a.classList.remove('visible')); }, 2000);
    }

    window.jumpTo = function(r, c) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        currentR = r; currentC = c;
        const target = document.getElementById(`s-${r}-${c}`);
        if (target) { 
            target.classList.add('active'); 
            updateArrows(r, c);
            moveHistory.push({ t: Date.now(), pos: [r,c], txt: target.innerText.substring(0,30) });
            document.querySelectorAll('.outline-item').forEach(el => el.classList.remove('active'));
            const item = document.querySelector(`.outline-item[data-pos="${r}-${c}"]`);
            if (item) { item.classList.add('active'); item.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            document.querySelectorAll('.map-dot').forEach(dot => dot.classList.remove('current'));
            document.querySelectorAll(`.map-dot[data-pos="${r}-${c}"]`).forEach(d => d.classList.add('current'));
        }
    };

    window.loadStrate = async function(name, r, c) { await load(name); setTimeout(() => window.jumpTo(r, c), 300); };

    function moveDir(r, c) {
        const nR = currentR + r, nC = currentC + c;
        if (nR >= 0 && nC >= 0) {
            if (!globalMatrix[nR]) globalMatrix[nR] = [];
            if (!globalMatrix[nR][nC] && isEditMode) {
                undoStack.push(JSON.parse(JSON.stringify(globalMatrix)));
                globalMatrix[nR][nC] = { text: "...", bg: "#eeeeee", r: nR, c: nC };
                render(); buildOutline();
            }
            if (globalMatrix[nR][nC]) window.jumpTo(nR, nC);
        }
    }

    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell) {
                    const slide = document.createElement('div');
                    slide.className = 'slide' + (rIdx === currentR && cIdx === currentC ? ' active' : '');
                    slide.id = `s-${rIdx}-${cIdx}`;
                    slide.style.backgroundColor = cell.bg;
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content' + (isEditMode ? ' editing' : '');
                    contentDiv.contentEditable = isEditMode;
                    contentDiv.innerHTML = isEditMode ? cell.text : marked.parse(cell.text);
                    contentDiv.oninput = (e) => { cell.text = e.target.innerText; };
                    slide.appendChild(contentDiv);
                    container.appendChild(slide);
                }
            });
        });
        updateArrows(currentR, currentC);
    }

    function buildOutline() {
        const content = document.getElementById('outline-content');
        const minimap = document.getElementById('matrix-minimap');
        const hud = document.getElementById('hud-minimap');
        content.innerHTML = ""; minimap.innerHTML = ""; hud.innerHTML = "";
        if (!globalMatrix.length) return;
        const cols = globalMatrix.reduce((max, row) => Math.max(max, row.length), 0);
        minimap.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        hud.style.display = "grid"; hud.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                const dot = document.createElement('div'); const hDot = document.createElement('div');
                dot.className = "map-dot"; hDot.className = "map-dot";
                dot.dataset.pos = `${rIdx}-${cIdx}`; hDot.dataset.pos = `${rIdx}-${cIdx}`;
                if (cell) {
                    dot.classList.add('occupied'); hDot.classList.add('occupied');
                    dot.onclick = () => window.jumpTo(rIdx, cIdx);
                    const item = document.createElement('div');
                    item.className = "outline-item"; item.dataset.pos = `${rIdx}-${cIdx}`;
                    item.style.marginLeft = (cIdx * 15) + "px";
                    item.innerText = cell.text.substring(0, 50) || `[${rIdx},${cIdx}]`;
                    item.onclick = () => { window.jumpTo(rIdx, cIdx); document.getElementById('system-panel').classList.remove('open'); };
                    content.appendChild(item);
                }
                minimap.appendChild(dot); hud.appendChild(hDot);
            });
        });
    }

    async function load(name = "") {
        const loader = document.getElementById('loader');
        loader.style.display = 'flex'; loader.style.opacity = '1';
        try {
            const url = name ? `${PROXY_URL}?sheet=${encodeURIComponent(name)}` : PROXY_URL;
            const res = await fetch(url);
            const data = await res.json();
            currentSheetName = data.sheetName; globalMatrix = data.matrix;
            render(); buildOutline();
            document.getElementById('progress-line').style.width = "100%";
            loader.style.opacity = '0'; setTimeout(() => { loader.style.display = 'none'; }, 200);
            if(!name) window.jumpTo(0, 0);
        } catch (e) { console.error(e); }
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.body.addEventListener('click', (e) => {
            if (e.target.closest('#system-panel') || e.target.classList.contains('nav-arrow') || (isEditMode && e.target.closest('.content'))) return;
            const now = Date.now();
            if (now - lastTapTime > 400) clickCount = 1; else clickCount++;
            lastTapTime = now;
            clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                if (clickCount >= 5) document.getElementById('system-panel').classList.toggle('open');
                else if (clickCount === 3) document.getElementById('hud-minimap').classList.toggle('visible');
                clickCount = 0;
            }, 1000);
        });
        document.getElementById('close-sys').onclick = () => document.getElementById('system-panel').classList.remove('open');
        document.getElementById('btn-edit').onclick = () => { isEditMode = !isEditMode; document.getElementById('btn-edit').classList.toggle('active', isEditMode); render(); };
        document.getElementById('btn-undo').onclick = () => { if(undoStack.length > 0) { globalMatrix = undoStack.pop(); render(); buildOutline(); } };
        document.getElementById('btn-exp-mat').onclick = () => {
            const dataStr = JSON.stringify({ sheetName: currentSheetName, matrix: globalMatrix, version: HTML_VERSION }, null, 2);
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([dataStr], { type: "application/json" }));
            link.download = `Matrice_${currentSheetName}.json`; link.click();
        };
        document.getElementById('btn-exp-log').onclick = () => {
            const logData = { meta: { role: "Machine Virtuelle Textuelle", version: HTML_VERSION }, matrix: globalMatrix, history: moveHistory };
            const link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([JSON.stringify(logData, null, 2)], { type: "application/json" }));
            link.download = `AI_LOG_${currentSheetName}.json`; link.click();
        };
        document.getElementById('btn-imp').onclick = () => document.getElementById('import-input').click();
        document.getElementById('import-input').onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => { const data = JSON.parse(ev.target.result); currentSheetName = data.sheetName; globalMatrix = data.matrix; render(); buildOutline(); window.jumpTo(0, 0); };
            reader.readAsText(file);
        };
        document.getElementById('btn-retro').onclick = async (e) => {
            const btn = e.currentTarget; btn.style.opacity = "0.3";
            try {
                await fetch(PROXY_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ matrix: globalMatrix }) });
                btn.style.color = "#27ae60"; btn.style.opacity = "1";
            } catch (err) { btn.style.color = "#e74c3c"; }
        };
        document.getElementById('v-up').onclick = (e) => { e.stopPropagation(); moveDir(-1, 0); };
        document.getElementById('v-down').onclick = (e) => { e.stopPropagation(); moveDir(1, 0); };
        document.getElementById('h-left').onclick = (e) => { e.stopPropagation(); moveDir(0, -1); };
        document.getElementById('h-right').onclick = (e) => { e.stopPropagation(); moveDir(0, 1); };
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, {passive: true});
        document.addEventListener('touchend', e => {
            if (isEditMode) return;
            const dx = e.changedTouches[0].screenX - touchStartX; const dy = e.changedTouches[0].screenY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 60) moveDir(0, dx > 0 ? -1 : 1); }
            else { if (Math.abs(dy) > 60) moveDir(dy > 0 ? -1 : 1, 0); }
        }, {passive: true});
        load();
    });
</script>
</body>
</html>
