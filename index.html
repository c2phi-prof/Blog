<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog C2PHI</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #fdfaf3; 
            --text-color: #3b438c; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color); 
            color: var(--text-color);
            font-family: 'Space Mono', monospace; 
            line-height: 1.6;
            padding: 60px 0; 
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 1100px; 
            margin: 0 auto; 
            padding: 0 40px; 
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: baseline; 
            margin-bottom: 120px; 
        }

        nav {
            display: flex;
            justify-content: flex-end;
            gap: 25px; /* Empêche le chevauchement des liens */
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px;
            border-bottom: 1px solid transparent;
            padding-bottom: 4px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        nav a:hover, nav a.active {
            border-bottom: 1px solid var(--text-color);
        }

        nav a.active {
            font-weight: 700;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(32px, 5.8vw, 82px); 
            font-weight: 600;
            letter-spacing: -0.02em; 
            line-height: 1;
            margin-bottom: 100px;
            white-space: nowrap; 
            outline: none;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -1px;
            cursor: default;
            user-select: none;
            text-transform: lowercase;
        }

        .section-row {
            display: grid;
            grid-template-columns: 1fr 500px; 
            gap: 40px;
            margin-bottom: 80px;
        }

        .label { font-size: 13px; font-weight: 700; outline: none; }
        
        .description p { 
            font-size: 15px; 
            margin-bottom: 25px; 
            text-align: justify; 
            outline: none; 
        }
        
        .description a { 
            color: var(--text-color); 
            text-decoration: none; 
            border-bottom: 1px solid var(--text-color); 
            padding-bottom: 1px; 
        }

        .edit-mode-on [contenteditable="true"]:focus { 
            background: rgba(59, 67, 140, 0.05); 
            border-radius: 2px; 
        }

        @media (max-width: 900px) {
            h1 { white-space: normal; font-size: 38px; letter-spacing: -0.02em; }
            .section-row { grid-template-columns: 1fr; gap: 10px; }
            header { flex-direction: column; align-items: flex-start; gap: 20px; }
            nav { justify-content: flex-start; width: 100%; gap: 20px; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div id="logo-trigger" class="logo">oak</div>
            <nav id="main-nav"></nav>
        </header>
        <main>
            <h1 id="page-title" contenteditable="false"></h1>
            <div id="sections-container"></div>
        </main>
    </div>

    <!-- Le fichier content.js doit contenir votre variable blogData -->
    <script src="content.js"></script>

    <script>
        let isEditMode = false;
        let currentIndex = 0;

        function parseLinks(text) {
            return text.replace(/\[([^|]+)\|([^\]]+)\]/g, '<a href="$2" target="_blank">$1</a>');
        }

        function renderSite() {
            const data = blogData[currentIndex];
            const pageKey = data.menuTitle.replace(/\s+/g, '-').toLowerCase();

            // Rendu du Menu de Navigation
            const nav = document.getElementById('main-nav');
            nav.innerHTML = '';
            blogData.forEach((page, index) => {
                const link = document.createElement('a');
                link.innerText = page.menuTitle;
                if(index === currentIndex) link.classList.add('active');
                link.onclick = () => { 
                    currentIndex = index; 
                    renderSite(); 
                };
                nav.appendChild(link); // Ordre logique des pages
            });

            // Rendu du Titre
            const titleEl = document.getElementById('page-title');
            const savedTitle = localStorage.getItem(`title-${pageKey}`);
            titleEl.innerText = savedTitle || data.pageHeadline;

            // Rendu des Sections
            const container = document.getElementById('sections-container');
            container.innerHTML = '';
            
            // On clone pour ne pas modifier l'original lors du tri aléatoire
            const shuffled = [...data.sections].sort(() => 0.5 - Math.random());
            
            shuffled.forEach(item => {
                const section = document.createElement('div');
                section.className = 'section-row';
                const sectionKey = item.section.replace(/\s+/g, '-').toLowerCase();
                
                const savedLabel = localStorage.getItem(`label-${pageKey}-${sectionKey}`);
                const savedText = localStorage.getItem(`text-${pageKey}-${sectionKey}`);

                section.innerHTML = `
                    <div class="label" data-sec="${sectionKey}" data-type="label" contenteditable="${isEditMode}">${savedLabel || item.section}</div>
                    <div class="description">
                        <p data-sec="${sectionKey}" data-type="text" contenteditable="${isEditMode}">${parseLinks(savedText || item.text)}</p>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        // Système de déverrouillage (5 clics sur le logo)
        let count = 0, timer;
        document.getElementById('logo-trigger').addEventListener('click', () => {
            count++; clearTimeout(timer);
            timer = setTimeout(() => count = 0, 1000);
            if (count === 5) {
                isEditMode = !isEditMode;
                document.body.classList.toggle('edit-mode-on', isEditMode);
                renderSite();
                count = 0;
            }
        });

        // Sauvegarde automatique
        document.addEventListener('input', (e) => {
            const el = e.target;
            const pageKey = blogData[currentIndex].menuTitle.replace(/\s+/g, '-').toLowerCase();
            if (el.id === 'page-title') {
                localStorage.setItem(`title-${pageKey}`, el.innerText);
            } else if (el.hasAttribute('data-sec')) {
                localStorage.setItem(`${el.dataset.type}-${pageKey}-${el.dataset.sec}`, el.innerText);
            }
        });

        renderSite();
    </script>
</body>
</html>
