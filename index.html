<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabyBlog - Stable</title>
    <style>
        :root { --primary: #000000; }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
            background-color: #ffffff;
            font-family: sans-serif;
        }

        #viewport-y {
            width: 100vw; height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            scrollbar-width: none;
        }

        .row-container { display: flex; width: 100vw; height: 100vh; scroll-snap-align: start; }
        .viewport-x {
            display: flex; width: 100vw; height: 100vh;
            overflow-x: scroll; scroll-snap-type: x mandatory;
            scroll-behavior: smooth; scrollbar-width: none;
        }
        #viewport-y::-webkit-scrollbar, .viewport-x::-webkit-scrollbar { display: none; }

        .slide {
            flex: 0 0 100vw; height: 100vh;
            display: flex; scroll-snap-align: start;
            box-sizing: border-box; padding: 80px;
            /* Suppression de toute ombre ou bordure parasite ici */
            border: none; 
            box-shadow: none;
        }

        /* FLÈCHES STABLES ET FIXES */
        .nav-arrow {
            position: fixed;
            background: none; border: none;
            font-size: 30px; color: #000;
            opacity: 0.1;
            cursor: pointer; z-index: 100;
            transition: opacity 0.3s; /* Uniquement l'opacité change */
            display: none; align-items: center; justify-content: center;
            width: 60px; height: 60px;
        }
        .nav-arrow.visible { display: flex; }
        .nav-arrow:hover { opacity: 0.5; transform: none; } /* Pas de scale/mouvement */

        .arrow-up { top: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 10px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 10px; top: 50%; transform: translateY(-50%); }

        .content { max-width: 1100px; width: 100%; line-height: 1.6; }
        .content a { color: inherit; text-decoration: underline; }

        #plan-sidebar {
            position: fixed; right: -320px; top: 0; width: 320px; height: 100%;
            background: white; z-index: 200; transition: right 0.4s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.1); padding: 25px; box-sizing: border-box;
            overflow-y: auto;
        }
        #plan-sidebar.debug-mode { right: 0; }
        .nav-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
        .nav-item.active { background: #f0f0f0; font-weight: bold; }
    </style>
</head>
<body>

<button id="v-up" class="nav-arrow arrow-up" onclick="moveDir(-1, 0)">▲</button>
<button id="v-down" class="nav-arrow arrow-down" onclick="moveDir(1, 0)">▼</button>
<button id="h-left" class="nav-arrow arrow-left" onclick="moveDir(0, -1)">◀</button>
<button id="h-right" class="nav-arrow arrow-right" onclick="moveDir(0, 1)">▶</button>

<div id="viewport-y"></div>

<div id="plan-sidebar">
    <h3 style="margin-top:0;">Exploration</h3>
    <div id="plan-list"></div>
</div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";
    let globalMatrix = [];
    let currentR = 0, currentC = 0;
    let inputLog = "";

    window.addEventListener("keydown", (e) => {
        inputLog += e.key;
        if (inputLog.includes("1234")) { document.getElementById("plan-sidebar").classList.toggle("debug-mode"); inputLog = ""; }
        if(e.key === "ArrowUp") moveDir(-1, 0);
        if(e.key === "ArrowDown") moveDir(1, 0);
        if(e.key === "ArrowLeft") moveDir(0, -1);
        if(e.key === "ArrowRight") moveDir(0, 1);
    });

    function moveDir(r, c) {
        const target = document.getElementById(`s-${currentR + r}-${currentC + c}`);
        if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start', inline: 'start' });
        }
    }

    async function load() {
        try {
            const res = await fetch(PROXY_URL);
            globalMatrix = await res.json();
            render();
        } catch (e) { console.error("Erreur chargement:", e); }
    }

    function render() {
        const container = document.getElementById('viewport-y');
        const plan = document.getElementById('plan-list');
        container.innerHTML = "";
        
        globalMatrix.forEach((row, rIdx) => {
            const rowBlock = document.createElement('div');
            rowBlock.className = 'row-container';
            const sliderX = document.createElement('div');
            sliderX.className = 'viewport-x';
            
            row.forEach((cell, cIdx) => {
                const sId = `s-${rIdx}-${cIdx}`;
                const slide = document.createElement('div');
                slide.className = 'slide';
                slide.id = sId;
                slide.dataset.r = rIdx; slide.dataset.c = cIdx;

                if (cell && cell.htmlContent) {
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    contentDiv.innerHTML = cell.htmlContent;
                    
                    slide.style.backgroundColor = cell.backgroundColor || "#ffffff";
                    contentDiv.style.color = cell.defaultFontColor || "#000000";

                    // Alignement
                    const fH = cell.horizontalAlignment === 'CENTER' ? 'center' : cell.horizontalAlignment === 'RIGHT' ? 'flex-end' : 'flex-start';
                    const fV = cell.verticalAlignment === 'MIDDLE' ? 'center' : cell.verticalAlignment === 'BOTTOM' ? 'flex-end' : 'flex-start';

                    slide.style.justifyContent = fH;
                    slide.style.alignItems = fV;
                    contentDiv.style.textAlign = cell.horizontalAlignment?.toLowerCase() || 'left';
                    
                    // Application des bordures si elles existent
                    if(cell.border) {
                        slide.style.borderTop = cell.border.top;
                        slide.style.borderBottom = cell.border.bottom;
                    }

                    slide.appendChild(contentDiv);

                    // Ajout au plan
                    const navItem = document.createElement('div');
                    navItem.className = 'nav-item';
                    navItem.id = `nav-item-${sId}`;
                    navItem.innerText = cell.htmlContent.replace(/<[^>]*>/g, '').substring(0, 35);
                    navItem.onclick = () => document.getElementById(sId).scrollIntoView({behavior:'smooth'});
                    plan.appendChild(navItem);
                } else {
                    slide.style.backgroundColor = "transparent";
                    slide.style.visibility = "hidden"; 
                }
                sliderX.appendChild(slide);
            });
            rowBlock.appendChild(sliderX);
            container.appendChild(rowBlock);
        });
        setupObserver();
    }

    function setupObserver() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    currentR = parseInt(entry.target.dataset.r);
                    currentC = parseInt(entry.target.dataset.c);
                    
                    const isV = (r, c) => {
                        return globalMatrix[r] && globalMatrix[r][c] && globalMatrix[r][c].htmlContent;
                    };

                    document.getElementById('v-up').classList.toggle('visible', isV(currentR-1, currentC));
                    document.getElementById('v-down').classList.toggle('visible', isV(currentR+1, currentC));
                    document.getElementById('h-left').classList.toggle('visible', isV(currentR, currentC-1));
                    document.getElementById('h-right').classList.toggle('visible', isV(currentR, currentC+1));

                    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                    const activeNav = document.getElementById(`nav-item-s-${currentR}-${currentC}`);
                    if(activeNav) activeNav.classList.add('active');
                }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.slide').forEach(s => observer.observe(s));
    }

    load();
</script>
</body>
</html>
