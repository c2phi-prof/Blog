<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Labyrinthe Panoptique</title>
    <style>
        :root { 
            --bg-color: #0a0a0a;
            --phone-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #888888;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
            /* Centre le smartphone sur l'écran */
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #phone-shell { 
            height: 85vh; 
            aspect-ratio: 9 / 19; 
            background: var(--phone-bg); 
            border: 10px solid #1a1a1a; 
            border-radius: 40px; 
            position: relative; 
            overflow: hidden; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.7); 
        }

        #viewport-y { height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #viewport-y::-webkit-scrollbar { display: none; }

        .row-container { height: 100%; width: 100%; scroll-snap-align: start; position: relative; }
        .viewport-x { display: flex; height: 100%; overflow-x: scroll; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .viewport-x::-webkit-scrollbar { display: none; }

        /* ALIGNEMENT DU TEXTE EN HAUT À GAUCHE DANS LA SLIDE */
      .slide { 
    display: flex; 
    flex-direction: column; 
    justify-content: flex-start; /* Texte en haut */
    text-align: left; /* Texte à gauche */
    padding: 60px 30px; /* Marge de confort */
}

.nav-arrow { 
    position: absolute !important; /* Fixe sur l'écran du smartphone */
    width: 40px;
    height: 40px;
    padding: 0 !important;
    margin: 0 !important; /* Supprime le décalage au survol */
}
/* On empêche tout mouvement au survol, juste un léger zoom si tu veux */
.nav-arrow:hover { 
    background: #ffffff;
    transform: translate(-50%, 0) scale(1.05); /* Pour les flèches haut/bas */
}

.nav-arrow.visible { 
    display: flex; 
}

/* Positionnement strict aux 4 points cardinaux */
.arrow-up { 
    top: 15px; 
    left: 50%; 
    transform: translateX(-50%); 
}

.arrow-down { 
    bottom: 15px; 
    left: 50%; 
    transform: translateX(-50%); 
}

.arrow-left { 
    left: 10px; 
    top: 50%; 
    transform: translateY(-50%); 
}

/* Correction spécifique pour la flèche droite pour éviter le décalage */
.arrow-right { 
    right: 10px; 
    top: 50%; 
    transform: translateY(-50%); 
}

        .ai-loading { color: var(--text-muted); font-style: italic; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="phone-shell">
        <button id="v-up" class="nav-arrow arrow-up" onclick="moveV(-1)">↑</button>
        <button id="v-down" class="nav-arrow arrow-down" onclick="moveV(1)">↓</button>
        <div id="viewport-y"></div>
    </div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbz2c1H5uA6CLdYRYe5BsV6UkMEmsOS2MVT2cVGo00W--xIt1taP3ZTQxfNGLn63nuHe-w/exec"; 
    let globalMatrix = [];
    let curR = 0, curC = 0;

    async function askGemini(prompt, elementId) {
        try {
            const response = await fetch(`${PROXY_URL}?prompt=${encodeURIComponent(prompt)}`);
            const text = await response.text();
            document.getElementById(elementId).innerHTML = text;
        } catch (e) {
            document.getElementById(elementId).innerHTML = "Le Sphinx est fatigué, réessayez plus tard.";
        }
    }

    async function load() {
        try {
            const res = await fetch(PROXY_URL);
            globalMatrix = await res.json();
            render();
        } catch (e) {
            console.error("Erreur de chargement", e);
        }
    }

    function render() {
        const phone = document.getElementById('viewport-y');
        phone.innerHTML = "";
        
        globalMatrix.forEach((row, rIdx) => {
            const rowBlock = document.createElement('div');
            rowBlock.className = 'row-container';
            const sliderX = document.createElement('div');
            sliderX.className = 'viewport-x';
            
            row.forEach((cell, cIdx) => {
                const slide = document.createElement('div');
                slide.className = 'slide';
                const sId = `s-${rIdx}-${cIdx}`;
                slide.id = sId;
                slide.dataset.r = rIdx; slide.dataset.c = cIdx;
                
                let content = cell ? cell.toString().trim() : "";

                if (content.startsWith("[AI_TEXT]")) {
                    slide.innerHTML = `<div id="ai-${sId}" class="ai-loading">L'IA rédige...</div>`;
                    askGemini(content.replace("[AI_TEXT]", ""), `ai-${sId}`);
                } else {
                    slide.innerHTML = `<div>${content}</div>`;
                }
                sliderX.appendChild(slide);
            });

            // Flèches de navigation horizontale
            const bL = document.createElement('button'); bL.id = `arr-l-${rIdx}`; bL.className='nav-arrow arrow-left'; bL.innerHTML='‹';
            bL.onclick = () => document.getElementById(`s-${rIdx}-${curC-1}`).scrollIntoView({behavior:'smooth'});
            const bR = document.createElement('button'); bR.id = `arr-r-${rIdx}`; bR.className='nav-arrow arrow-right'; bR.innerHTML='›';
            bR.onclick = () => document.getElementById(`s-${rIdx}-${curC+1}`).scrollIntoView({behavior:'smooth'});

            rowBlock.append(bL, bR, sliderX);
            phone.appendChild(rowBlock);
        });
        setupObs();
    }

    function moveV(dir) {
        const target = document.getElementById(`s-${curR+dir}-${curC}`);
        if(target) target.scrollIntoView({behavior:'smooth'});
    }

    function setupObs() {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    curR = parseInt(e.target.dataset.r);
                    curC = parseInt(e.target.dataset.c);
                    updateUI();
                }
            });
        }, { root: document.querySelector('#phone-shell'), threshold: 0.6 });
        document.querySelectorAll('.slide').forEach(s => obs.observe(s));
    }

    function updateUI() {
        const check = (r, c) => globalMatrix[r] && globalMatrix[r][c] && globalMatrix[r][c].toString().trim();
        document.getElementById('v-up').classList.toggle('visible', !!check(curR-1, curC));
        document.getElementById('v-down').classList.toggle('visible', !!check(curR+1, curC));
        
        document.querySelectorAll('.arrow-left, .arrow-right').forEach(a => a.classList.remove('visible'));
        const al = document.getElementById(`arr-l-${curR}`);
        const ar = document.getElementById(`arr-r-${curR}`);
        if(al) al.classList.toggle('visible', !!check(curR, curC-1));
        if(ar) ar.classList.toggle('visible', !!check(curR, curC+1));
    }

    load();
</script>
</body>
</html>
