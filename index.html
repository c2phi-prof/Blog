<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabyBlog - Plan Expert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: sans-serif; touch-action: none; }
        #main-container { width: 100vw; height: 100vh; position: relative; }

        .slide { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            display: none; box-sizing: border-box; padding: 20px; 
            overflow-y: auto; touch-action: pan-y; 
        }
        .slide.active { display: flex; } 

        .nav-arrow { 
            position: fixed; background: rgba(255, 255, 255, 0.3); border: none; 
            font-size: 40px; color: #000000 !important; z-index: 100; 
            display: none; align-items: center; justify-content: center; 
            width: 60px; height: 60px; border-radius: 50%;
            opacity: 0; transition: opacity 0.8s ease;
        }
        .nav-arrow.visible { display: flex; opacity: 0.15; } 
        
        .arrow-up { top: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 10px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 10px; top: 50%; transform: translateY(-50%); }

        /* VOLET DU PLAN */
        #outline-panel {
            position: fixed; top: 0; left: -420px; width: 400px; height: 100%;
            background: rgba(255, 255, 255, 0.98); box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            z-index: 1000; transition: left 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow-y: auto; padding: 15px; box-sizing: border-box;
            font-family: 'Inconsolata', 'Courier New', Courier, monospace;
        }
        #outline-panel.open { left: 0; }

        /* HEADER AVEC MINIMAP 24PX */
        .outline-header {
            display: flex; align-items: flex-start;
            border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px;
        }

        #matrix-minimap {
            display: grid; gap: 1px; background: #fff; border: 1px solid #ddd;
            width: 24px; height: 24px; padding: 1px;
        }
        .map-dot { width: 100%; height: 100%; background-color: #fff; }
        .map-dot.occupied { background-color: #888; cursor: pointer; }
        .map-dot.highlight { background-color: #000 !important; transform: scale(1.2); }

        /* ITEMS DU PLAN */
        .outline-item { 
            cursor: pointer; padding: 4px 8px; border-left: 2px solid transparent;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; 
            overflow: hidden; font-size: 0.7rem; color: #666; line-height: 1.1;
            margin-bottom: 8px; transition: all 0.2s;
        }
        .outline-item.highlight { background: #f0f0f0; border-left: 2px solid #000; color: #000; }
        .outline-empty { height: 4px; }

        .content { width: 100%; line-height: 1; font-size: 1.2rem; white-space: pre-wrap; word-wrap: break-word; }
        a { cursor: pointer; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="outline-panel">
    <div class="outline-header">
        <div id="matrix-minimap"></div>
    </div>
    <div id="outline-content"></div>
</div>

<button id="v-up" class="nav-arrow arrow-up" onclick="moveDir(-1, 0, event)">▲</button>
<button id="v-down" class="nav-arrow arrow-down" onclick="moveDir(1, 0, event)">▼</button>
<button id="h-left" class="nav-arrow arrow-left" onclick="moveDir(0, -1, event)">◀</button>
<button id="h-right" class="nav-arrow arrow-right" onclick="moveDir(0, 1, event)">▶</button>

<div id="main-container"></div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";
    let globalMatrix = [];
    let currentR = 0, currentC = 0;
    let clickCount = 0, clickTimer = null;
    let arrowTimer = null;
    let lastTapTime = 0;

    function handleGlobalClick(e) {
        if (e.target.closest('#outline-panel') || e.target.classList.contains('nav-arrow')) return;
        showArrows(); 

        const now = Date.now();
        if (now - lastTapTime < 300) { // Double tap mobile / Double clic
            clickCount = 0;
        } else {
            clickCount++;
        }
        lastTapTime = now;

        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1200);

        if (clickCount >= 5) {
            document.getElementById('outline-panel').classList.toggle('open');
            clickCount = 0;
        }
    }

    function showArrows() {
        const arrows = document.querySelectorAll('.nav-arrow');
        arrows.forEach(a => { if (a.dataset.exists === "true") a.classList.add('visible'); });
        clearTimeout(arrowTimer);
        arrowTimer = setTimeout(() => {
            arrows.forEach(a => a.classList.remove('visible'));
        }, 3000); 
    }

    async function load() {
        try {
            const res = await fetch(PROXY_URL);
            globalMatrix = await res.json();
            render();
            buildOutline();
        } catch (e) { console.error(e); }
    }

    function buildOutline() {
        const content = document.getElementById('outline-content');
        const minimap = document.getElementById('matrix-minimap');
        content.innerHTML = "";
        minimap.innerHTML = "";

        const numRows = globalMatrix.length;
        const numCols = globalMatrix[0].length;
        minimap.style.gridTemplateColumns = `repeat(${numCols}, 1fr)`;
        minimap.style.gridTemplateRows = `repeat(${numRows}, 1fr)`;

        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                const cellId = `cell-${rIdx}-${cIdx}`;
                const dot = document.createElement('div');
                dot.id = `dot-${cellId}`;
                
                if (cell) {
                    dot.className = "map-dot occupied";
                    
                    const item = document.createElement('div');
                    item.id = `item-${cellId}`;
                    item.className = "outline-item";
                    item.style.marginLeft = (cIdx * 20) + "px"; 
                    
                    const tempDiv = document.createElement("div");
                    tempDiv.innerHTML = cell.htmlContent;
                    item.innerText = tempDiv.innerText.trim();

                    // INTERACTION CROISÉE
                    const highlight = (on) => {
                        dot.classList.toggle('highlight', on);
                        item.classList.toggle('highlight', on);
                    };

                    item.onmouseenter = () => highlight(true);
                    item.onmouseleave = () => highlight(false);
                    dot.onmouseenter = () => highlight(true);
                    dot.onmouseleave = () => highlight(false);

                    const action = (e) => {
                        e.stopPropagation();
                        window.jumpTo(rIdx, cIdx);
                        document.getElementById('outline-panel').classList.remove('open');
                    };

                    item.onclick = action;
                    dot.onclick = action;

                    content.appendChild(item);
                } else {
                    dot.className = "map-dot";
                    const gap = document.createElement('div');
                    gap.className = "outline-empty";
                    content.appendChild(gap);
                }
                minimap.appendChild(dot);
            });
        });
    }

    window.jumpTo = function(r, c) {
        const active = document.querySelector('.slide.active');
        if (active) active.classList.remove('active');
        currentR = r; currentC = c;
        const target = document.getElementById(`s-${currentR}-${currentC}`);
        if (target) {
            target.classList.add('active');
            target.scrollTop = 0;
            updateArrows(currentR, currentC);
        }
    };

    function moveDir(r, c, e) {
        if (e) e.stopPropagation();
        const nextR = currentR + r;
        const nextC = currentC + c;
        if (globalMatrix[nextR] && globalMatrix[nextR][nextC]) window.jumpTo(nextR, nextC);
    }

    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell) {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    if (rIdx === 0 && cIdx === 0) slide.classList.add('active');
                    slide.id = `s-${rIdx}-${cIdx}`;
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    contentDiv.innerHTML = cell.htmlContent.replace(/\n/g, '<br>');
                    slide.style.backgroundColor = cell.backgroundColor;
                    const hA = (cell.horizontalAlignment || "").toUpperCase();
                    const vA = (cell.verticalAlignment || "").toUpperCase();
                    slide.style.justifyContent = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "flex-end" : "flex-start";
                    slide.style.alignItems = vA.includes("MIDDLE") ? "center" : vA.includes("BOTTOM") ? "flex-end" : "flex-start";
                    contentDiv.style.textAlign = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "right" : "left";
                    slide.appendChild(contentDiv);
                    container.appendChild(slide);
                }
            });
        });
        updateArrows(0, 0);
    }

    function updateArrows(r, c) {
        const hasCell = (row, col) => {
            if (row < 0 || col < 0) return false;
            return globalMatrix[row] && globalMatrix[row][col] !== null;
        };
        const config = {'v-up': hasCell(r-1,c), 'v-down': hasCell(r+1,c), 'h-left': hasCell(r,c-1), 'h-right': hasCell(r,c+1)};
        for (let id in config) {
            const btn = document.getElementById(id);
            if(btn) {
                btn.dataset.exists = config[id]; 
                btn.style.display = config[id] ? 'flex' : 'none';
            }
        }
        showArrows(); 
    }

    load();
</script>
</body>
</html>
