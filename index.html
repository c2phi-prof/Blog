<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabyBlog v4.3.5 - Machine Virtuelle Textuelle</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #eeeeee; --text: #333; --accent: #FFD700; --ui-idle: #777; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: 'Inter', sans-serif; touch-action: none; }
        #main-container { width: 100vw; height: 100vh; position: relative; z-index: 1; }
        #system-panel { position: fixed; top: 0; left: -100vw; width: 100vw; height: 100vh; background: #fcfcfc; z-index: 1000; transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        #system-panel.open { left: 0; }
        .system-header { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .system-tools { display: flex; flex-wrap: wrap; gap: 10px; justify-content: flex-end; }
        #matrix-minimap { display: grid; gap: 2px; background: #eee; border: 1px solid #ddd; padding: 4px; width: fit-content; }
        .map-dot { width: 14px; height: 14px; background-color: #fff; border-radius: 1px; }
        .map-dot.occupied { background-color: #bbb; cursor: pointer; }
        .map-dot.current { background-color: var(--text); }
        .tool-btn { width: 45px; height: 45px; background: #fff; border: 1px solid #ddd; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; color: var(--ui-idle); transition: all 0.2s; }
        .tool-btn.active { color: #000; border-color: #000; background: #f0f0f0; }
        #outline-content { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; border-top: 1px solid #eee; padding-top: 10px; }
        .outline-item { cursor: pointer; padding: 12px; border-left: 2px solid #eee; background: #f9f9f9; font-size: 0.8rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .outline-item.active { border-left-color: #000; background: #fff; color: #000; font-weight: bold; }
        #hud-minimap { position: fixed; bottom: 20px; right: 20px; z-index: 500; pointer-events: none; opacity: 0; transition: opacity 0.3s; background: rgba(255,255,255,0.6); padding: 4px; border: 1px solid #ddd; }
        #hud-minimap.visible { opacity: 0.4; }
        .slide { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; box-sizing: border-box; padding: 40px; overflow-y: auto; }
        .slide.active { display: flex; } 
        .content { width: 100%; line-height: 1.4; font-size: 1.2rem; outline: none; position: relative; }
        .editing::after { content: '_'; animation: blink 0.8s infinite; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .nav-arrow { position: fixed; background: rgba(255, 255, 255, 0.3); border: none; font-size: 40px; color: #000; z-index: 100; display: none; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 50%; opacity: 0; transition: opacity 0.8s ease; }
        .nav-arrow.visible { display: flex; opacity: 0.15; } 
        .arrow-up { top: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 10px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 10px; top: 50%; transform: translateY(-50%); }
        #loader { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.2s ease; }
        .data-engine { display: flex; align-items: center; width: 400px; font-family: 'Inconsolata', monospace; font-size: 12px; }
        #progress-line { height: 1px; background: #000; width: 0%; transition: width 0.1s linear; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="loader">
    <div class="data-engine">
        <div id="slot-left" style="flex:1; text-align:right; padding-right:20px;"></div>
        <div style="flex:2; background:#eee; height:1px;"><div id="progress-line"></div></div>
        <div id="slot-right" style="flex:1; text-align:left; padding-left:20px;"></div>
    </div>
</div>

<div id="hud-minimap"></div>

<div id="system-panel">
    <div class="system-header">
        <div style="display:flex; justify-content: space-between; align-items: flex-start;">
            <div id="matrix-minimap"></div>
            <button class="tool-btn" onclick="toggleSystem()" style="background:#f0f0f0; color:#000; border-radius: 50%;">✕</button>
        </div>
        <div class="system-tools">
            <button class="tool-btn" id="btn-edit" onclick="toggleEditMode()" title="Édition">✎</button>
            <button class="tool-btn" onclick="undo()" title="Annuler">⎌</button>
            <button class="tool-btn" onclick="exportAndCopy()" title="Exporter Matrice">⭳</button>
            <button class="tool-btn" onclick="exportAILog()" title="Historique IA">◷</button>
            <button class="tool-btn" onclick="smartImport()" title="Importer">⭱</button>
            <button class="tool-btn" id="btn-retro" onclick="exportToSheet(event)" title="Rétro-Matriçage">◈</button>
            <input type="file" id="import-input" style="display:none" onchange="importMatrixFile(event)">
        </div>
    </div>
    <div id="outline-content"></div>
</div>

<button id="v-up" class="nav-arrow arrow-up" onclick="moveDir(-1, 0, event)">▲</button>
<button id="v-down" class="nav-arrow arrow-down" onclick="moveDir(1, 0, event)">▼</button>
<button id="h-left" class="nav-arrow arrow-left" onclick="moveDir(0, -1, event)">◀</button>
<button id="h-right" class="nav-arrow arrow-right" onclick="moveDir(0, 1, event)">▶</button>

<div id="main-container"></div>

<script>
    const HTML_VERSION = "4.3.5";
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";
    let globalMatrix = [], currentSheetName = "", currentR = 0, currentC = 0;
    let clickCount = 0, clickTimer = null, lastTapTime = 0;
    let isEditMode = false, moveHistory = [], undoStack = [];

    // --- FONCTIONS DE NAVIGATION ET UI (DÉFINIES AVANT APPEL) ---
    function updateArrows(r, c) {
        const has = (row, col) => globalMatrix[row] && globalMatrix[row][col];
        const cfg = {'v-up': has(r-1,c), 'v-down': has(r+1,c), 'h-left': has(r,c-1), 'h-right': has(r,c+1)};
        for (let id in cfg) { 
            const btn = document.getElementById(id);
            if(btn) { btn.dataset.exists = !!cfg[id]; btn.style.display = 'flex'; btn.style.opacity = cfg[id] ? "0.15" : "0.02"; }
        }
        showArrows();
    }

    function showArrows() {
        const arrows = document.querySelectorAll('.nav-arrow');
        arrows.forEach(a => a.classList.add('visible'));
        clearTimeout(window.arrowTimer);
        window.arrowTimer = setTimeout(() => { arrows.forEach(a => a.classList.remove('visible')); }, 2000); 
    }

    function highlightInOutline(r, c) {
        document.querySelectorAll('.outline-item').forEach(el => el.classList.remove('active'));
        const target = document.querySelector(`.outline-item[data-pos="${r}-${c}"]`);
        if (target) { target.classList.add('active'); target.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        document.querySelectorAll('.map-dot').forEach(dot => dot.classList.remove('current'));
        const dot = document.querySelectorAll(`.map-dot[data-pos="${r}-${c}"]`);
        dot.forEach(d => d.classList.add('current'));
    }

    window.jumpTo = function(r, c) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        currentR = r; currentC = c;
        const target = document.getElementById(`s-${r}-${c}`);
        if (target) { 
            target.classList.add('active'); 
            updateArrows(r, c);
            moveHistory.push({ t: Date.now(), pos: [r,c], txt: target.innerText.substring(0,30) });
            highlightInOutline(r, c);
        }
    };

    function moveDir(r, c, e) {
        if (e) e.stopPropagation();
        const nR = currentR + r, nC = currentC + c;
        if (nR >= 0 && nC >= 0) {
            if (!globalMatrix[nR]) globalMatrix[nR] = [];
            if (!globalMatrix[nR][nC] && isEditMode) {
                saveState();
                globalMatrix[nR][nC] = { htmlContent: "...", horizontalAlignment: "center", verticalAlignment: "middle", backgroundColor: "#eeeeee" };
                render(); buildOutline();
            }
            if (globalMatrix[nR][nC]) window.jumpTo(nR, nC);
        }
    }

    function toggleSystem() { document.getElementById('system-panel').classList.toggle('open'); }
    function toggleHUD() { document.getElementById('hud-minimap').classList.toggle('visible'); }

    // --- LOGIQUE DE RENDU ---
    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell) {
                    const slide = document.createElement('div');
                    slide.className = 'slide' + (rIdx === currentR && cIdx === currentC ? ' active' : '');
                    slide.id = `s-${rIdx}-${cIdx}`;
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content' + (isEditMode ? ' editing' : '');
                    contentDiv.contentEditable = isEditMode;
                    contentDiv.innerHTML = marked.parse(cell.htmlContent);
                    contentDiv.onfocus = () => saveState();
                    contentDiv.oninput = (e) => { globalMatrix[rIdx][cIdx].htmlContent = e.target.innerHTML; };
                    slide.style.backgroundColor = cell.backgroundColor;
                    slide.style.justifyContent = "center"; slide.style.alignItems = "center";
                    contentDiv.style.textAlign = "center";
                    slide.appendChild(contentDiv);
                    container.appendChild(slide);
                }
            });
        });
        updateArrows(currentR, currentC);
    }

    function buildOutline() {
        const content = document.getElementById('outline-content');
        const minimap = document.getElementById('matrix-minimap');
        const hud = document.getElementById('hud-minimap');
        content.innerHTML = ""; minimap.innerHTML = ""; hud.innerHTML = "";
        if (!globalMatrix.length) return;
        const cols = globalMatrix.reduce((max, row) => Math.max(max, row.length), 0);
        minimap.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        hud.style.display = "grid"; hud.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                const dot = document.createElement('div'); const hDot = document.createElement('div');
                dot.className = "map-dot"; hDot.className = "map-dot";
                dot.dataset.pos = `${rIdx}-${cIdx}`; hDot.dataset.pos = `${rIdx}-${cIdx}`;
                if (cell) {
                    dot.classList.add('occupied'); hDot.classList.add('occupied');
                    dot.onclick = () => window.jumpTo(rIdx, cIdx);
                    const item = document.createElement('div');
                    item.className = "outline-item"; item.dataset.pos = `${rIdx}-${cIdx}`;
                    item.style.marginLeft = (cIdx * 15) + "px";
                    item.innerHTML = cell.htmlContent.replace(/<[^>]*>/g, '').substring(0, 60) || `[${rIdx},${cIdx}]`;
                    item.onclick = () => { window.jumpTo(rIdx, cIdx); toggleSystem(); };
                    content.appendChild(item);
                }
                minimap.appendChild(dot); hud.appendChild(hDot);
            });
        });
    }

    // --- GESTION DES ÉTATS ---
    function saveState() { undoStack.push(JSON.parse(JSON.stringify(globalMatrix))); if(undoStack.length > 20) undoStack.shift(); }
    function undo() { if(undoStack.length > 0) { globalMatrix = undoStack.pop(); render(); buildOutline(); } }
    function toggleEditMode() { isEditMode = !isEditMode; document.getElementById('btn-edit').classList.toggle('active', isEditMode); render(); }

    function handleGlobalClick(e) {
        if (e.target.closest('#system-panel') || e.target.classList.contains('nav-arrow') || e.target.contentEditable === "true") return;
        const now = Date.now();
        if (now - lastTapTime > 150) clickCount = 1; else clickCount++;
        lastTapTime = now;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => {
            if (clickCount >= 5) toggleSystem();
            else if (clickCount === 3) toggleHUD();
            clickCount = 0;
        }, 500);
        showArrows();
    }

    // --- CHARGEMENT ET EXPORT ---
    async function load(name = "") {
        const loader = document.getElementById('loader');
        const bar = document.getElementById('progress-line');
        try {
            const url = name ? `${PROXY_URL}?sheet=${encodeURIComponent(name)}` : PROXY_URL;
            const res = await fetch(url);
            const data = await res.json();
            currentSheetName = data.sheetName; globalMatrix = data.matrix;
            render(); buildOutline();
            bar.style.width = "100%";
            loader.style.opacity = '0'; setTimeout(() => { loader.style.display = 'none'; }, 200);
            if(!name) window.jumpTo(0, 0);
        } catch (e) { document.getElementById('slot-left').innerText = "ERR"; console.error(e); }
    }

    function exportAILog() {
        const logData = {
            meta: { role: "Machine Virtuelle Textuelle (LabyBlog)", version: HTML_VERSION, description: "Moteur de spatialisation pour matrices de textes. Permet une navigation linéaire ou non-linéaire (hyperliens). Architecture multi-strates." },
            instructions: "Analyse l'historique de navigation au sein de la matrice fournie. Interprète le parcours (boucles, hésitations, vitesse, sauts) en fonction du contenu sémantique ou symbolique des cellules.",
            matrix: globalMatrix,
            history: moveHistory
        };
        const blob = new Blob([JSON.stringify(logData, null, 2)], { type: "application/json" });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
        link.download = `AI_LOG_${currentSheetName}.json`; link.click();
    }

    function exportAndCopy() {
        const dataStr = JSON.stringify({ sheetName: currentSheetName, matrix: globalMatrix, version: HTML_VERSION }, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
        link.download = `Matrice_${currentSheetName}.json`; link.click();
    }

    function smartImport() { document.getElementById('import-input').click(); }
    function importMatrixFile(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => { const data = JSON.parse(e.target.result); currentSheetName = data.sheetName; globalMatrix = data.matrix; render(); buildOutline(); window.jumpTo(0, 0); };
        reader.readAsText(file);
    }

    async function exportToSheet(e) {
        const btn = e.currentTarget; btn.style.opacity = "0.3";
        try {
            await fetch(PROXY_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ matrix: globalMatrix }) });
            await new Promise(r => setTimeout(r, 1500));
            btn.style.color = "#27ae60"; btn.style.opacity = "1";
            setTimeout(() => { btn.style.color = ""; }, 2000);
        } catch (err) { btn.style.color = "#e74c3c"; btn.style.opacity = "1"; }
    }

    // --- INITIALISATION ---
    marked.setOptions({ gfm: true, breaks: true, sanitize: false });
    let touchStartX = 0, touchStartY = 0;
    document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; }, {passive: true});
    document.addEventListener('touchend', e => {
        if (isEditMode) return;
        const dx = e.changedTouches[0].screenX - touchStartX;
        const dy = e.changedTouches[0].screenY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy)) { if (Math.abs(dx) > 60) moveDir(0, dx > 0 ? -1 : 1); }
        else { if (Math.abs(dy) > 60) moveDir(dy > 0 ? -1 : 1, 0); }
    }, {passive: true});

    load();
</script>
</body>
</html>
