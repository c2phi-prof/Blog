<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LabyBlog - Navigation Instantanée</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: sans-serif; 
        }
        
        /* Conteneur fixe : on ne scrolle plus physiquement */
        #main-container { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
        }

        /* Les slides sont empilées les unes sur les autres */
        .slide { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            display: none; /* Caché par défaut */
            box-sizing: border-box; 
            padding: 80px; 
            border: none !important;
        }

        /* Seule la slide active est affichée en Flexbox */
        .slide.active { 
            display: flex; 
        } 

        /* FLÈCHES NOIRES ET FIXES */
        .nav-arrow { 
            position: fixed; 
            background: none; 
            border: none; 
            font-size: 40px; 
            color: #000000 !important; 
            opacity: 0.1; 
            cursor: pointer; 
            z-index: 100; 
            display: none; /* Géré par le script updateArrows */
            align-items: center; 
            justify-content: center; 
            width: 80px; 
            height: 80px; 
            transition: opacity 0.2s;
        }
        
        .nav-arrow.visible { display: flex; }
        .nav-arrow:hover { opacity: 0.5; }
        
        /* Positionnement des flèches */
        .arrow-up { top: 0; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 0; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 0; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 0; top: 50%; transform: translateY(-50%); }
        
        .content { 
            max-width: 1100px; 
            width: 100%; 
            line-height: 1.6; 
        }
    </style>
</head>
<body>

<!-- Interface de navigation -->
<button id="v-up" class="nav-arrow arrow-up" onclick="moveDir(-1, 0)">▲</button>
<button id="v-down" class="nav-arrow arrow-down" onclick="moveDir(1, 0)">▼</button>
<button id="h-left" class="nav-arrow arrow-left" onclick="moveDir(0, -1)">◀</button>
<button id="h-right" class="nav-arrow arrow-right" onclick="moveDir(0, 1)">▶</button>

<div id="main-container"></div>

<script>
    // URL de votre déploiement Google Apps Script
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";

    let globalMatrix = [];
    let currentR = 0, currentC = 0;

    async function load() {
        try {
            const res = await fetch(PROXY_URL);
            globalMatrix = await res.json();
            render();
        } catch (e) { 
            console.error("Erreur lors du chargement des données :", e); 
        }
    }

    /**
     * Gère le changement de page instantané
     */
    function moveDir(r, c) {
        const nextR = currentR + r;
        const nextC = currentC + c;
        
        // Vérification de l'existence de la cible
        if (globalMatrix[nextR] && globalMatrix[nextR][nextC]) {
            // Retirer l'état actif de la page actuelle
            const currentSlide = document.querySelector('.slide.active');
            if (currentSlide) currentSlide.classList.remove('active');
            
            // Mettre à jour les coordonnées
            currentR = nextR;
            currentC = nextC;
            
            // Activer la nouvelle page
            const nextSlide = document.getElementById(`s-${currentR}-${currentC}`);
            if (nextSlide) nextSlide.classList.add('active');
            
            // Mettre à jour les flèches immédiatement
            updateArrows(currentR, currentC);
        }
    }

    /**
     * Génère les slides dans le DOM
     */
    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell) {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    // Active la première cellule trouvée (généralement A1)
                    if (rIdx === 0 && cIdx === 0) slide.classList.add('active');
                    slide.id = `s-${rIdx}-${cIdx}`;
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    contentDiv.innerHTML = cell.htmlContent;
                    
                    slide.style.backgroundColor = cell.backgroundColor;
                    
                    // Gestion souple des alignements
                    const hA = (cell.horizontalAlignment || "").toUpperCase();
                    const vA = (cell.verticalAlignment || "").toUpperCase();
                    
                    slide.style.justifyContent = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "flex-end" : "flex-start";
                    slide.style.alignItems = vA.includes("MIDDLE") ? "center" : vA.includes("BOTTOM") ? "flex-end" : "flex-start";
                    contentDiv.style.textAlign = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "right" : "left";
                    
                    slide.appendChild(contentDiv);
                    container.appendChild(slide);
                }
            });
        });
        // Initialisation des flèches pour le point de départ
        updateArrows(0, 0);
    }

    /**
     * Logique de détection des voisins pour afficher/cacher les flèches
     */
    function updateArrows(r, c) {
        const hasCell = (row, col) => {
            if (row < 0 || col < 0) return false;
            // Vérifie si la ligne existe et si la cellule n'est pas vide
            return globalMatrix[row] && 
                   globalMatrix[row][col] !== undefined && 
                   globalMatrix[row][col] !== null;
        };
        
        const config = {
            'v-up': hasCell(r - 1, c),
            'v-down': hasCell(r + 1, c),
            'h-left': hasCell(r, c - 1),
            'h-right': hasCell(r, c + 1)
        };

        // Application stricte de l'état (nécessaire pour Opera GX)
        for (let id in config) {
            const btn = document.getElementById(id);
            if (config[id]) {
                btn.style.display = 'flex';
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
                btn.style.display = 'none';
            }
        }
    }

    // Lancement du chargement
    window.onload = load;
</script>
</body>
</html>
