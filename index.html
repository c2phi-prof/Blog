<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oak - Que peut le droit contre la force ?</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf3;
            --text-color: #3b438c;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Space Mono', monospace;
            line-height: 1.6;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 120px;
        }
        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -1px;
            text-transform: lowercase;
            cursor: pointer;
        }
        nav {
            display: flex;
            justify-content: flex-end;
            gap: 25px;
        }
        nav a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 4px;
            white-space: nowrap;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(30px, 5.5vw, 80px); 
            font-weight: 600;
            letter-spacing: -0.04em;
            margin-bottom: 100px;
            white-space: nowrap; 
            line-height: 1.1;
            outline: none;
        }
        .section-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-bottom: 100px;
        }
        .label {
            font-size: 13px;
            font-weight: 700;
            outline: none;
        }
        .description p {
            font-size: 15px;
            margin-bottom: 25px;
            max-width: 500px; 
            text-align: justify;
            outline: none;
        }
        .description a {
            color: var(--text-color);
            text-decoration: none;
            border-bottom: 1px solid var(--text-color);
            padding-bottom: 1px;
        }
        .edit-mode-on [contenteditable="true"]:focus {
            background: rgba(59, 67, 140, 0.05);
            border-radius: 2px;
        }
        @media (max-width: 900px) {
            h1 { white-space: normal; font-size: 40px; }
            .section-row { grid-template-columns: 1fr; }
            header { flex-direction: column; align-items: flex-start; gap: 20px; }
            nav { justify-content: flex-start; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div id="logo-trigger" class="logo">oak</div>
            <nav>
                <a href="#">Justice</a>
                <a href="#">May 4th</a>
            </nav>
        </header>

        <main>
            <h1 id="page-title" contenteditable="false">Que peut le droit contre la force ?</h1>
            <div id="sections-container">
                <!-- Les sections sont injectées ici par le JS -->
            </div>
        </main>
    </div>

    <script>
        // Données sources intégrées
        const contentData = [
            { id: "callicles", label: "Calliclès", text: "La loi n'est qu'une convention arbitraire imposée par les faibles pour brider l'excellence des tempéraments supérieurs. Elle constitue un déni de l'ordre naturel. <a href='https://fr.wikisource.org/wiki/Gorgias/Édition_Chambry' target='_blank'>Texte source : Gorgias.</a>" },
            { id: "rousseau", label: "Rousseau", text: "La force est une puissance physique dont aucun effet moral ne saurait résulter. Le droit naît de la transformation de la force en autorité légitime via le contrat social. <a href='https://gallica.bnf.fr/ark:/12148/bpt6k118391t' target='_blank'>Texte source : Contrat Social.</a>" },
            { id: "weber", label: "Max Weber", text: "L'État moderne se caractérise par la revendication du monopole de la violence physique légitime. Le droit ne supprime pas la force mais la rationalise. <a href='https://classiques.uqac.ca/classiques/weber_max/le_savant_et_le_politique/le_savant_et_le_politique.html' target='_blank'>Texte source : Le Savant et le Politique.</a>" },
            { id: "bakounine", label: "Bakounine", text: "Toute législation est une négation de la liberté humaine. Le droit n'est que la force de l'État masquée par l'abstraction juridique. <a href='https://fr.wikisource.org/wiki/Dieu_et_l’État' target='_blank'>Texte source : Dieu et l'État.</a>" },
            { id: "gandhi", label: "Gandhi", text: "Le droit authentique tire sa force de la vérité (Satya). Face à l'oppression, le droit s'incarne dans la non-violence active, force spirituelle supérieure. <a href='https://www.philosophie-magazine.com/articles/gandhi-penseur-de-la-non-violence' target='_blank'>Analyse : Philosophie Magazine.</a>" }
        ];

        let isEditMode = false;

        function init() {
            const container = document.getElementById('sections-container');
            const titleEl = document.getElementById('page-title');
            
            // Chargement Titre
            const savedTitle = localStorage.getItem('main-title');
            if(savedTitle) titleEl.innerText = savedTitle;

            // Mélange et rendu
            const shuffled = contentData.sort(() => 0.5 - Math.random());
            shuffled.forEach(item => {
                const section = document.createElement('div');
                section.className = 'section-row';
                
                const savedLabel = localStorage.getItem('label-' + item.id) || item.label;
                const savedText = localStorage.getItem('text-' + item.id) || item.text;

                section.innerHTML = `
                    <div class="label" data-id="${item.id}" data-type="label" contenteditable="false">${savedLabel}</div>
                    <div class="description">
                        <p data-id="${item.id}" data-type="text" contenteditable="false">${savedText}</p>
                    </div>
                `;
                container.appendChild(section);
            });
        }

        // Mode Edition (5 clics sur logo)
        let count = 0, timer;
        document.getElementById('logo-trigger').addEventListener('click', () => {
            count++; clearTimeout(timer);
            timer = setTimeout(() => count = 0, 1000);
            if (count === 5) {
                isEditMode = !isEditMode;
                document.body.classList.toggle('edit-mode-on', isEditMode);
                document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = isEditMode);
                count = 0;
            }
        });

        // Sauvegarde auto
        document.addEventListener('input', (e) => {
            const el = e.target;
            if (el.id === 'page-title') {
                localStorage.setItem('main-title', el.innerText);
            } else if (el.hasAttribute('data-id')) {
                localStorage.setItem(`${el.dataset.type}-${el.dataset.id}`, el.innerHTML);
            }
        });

        init();
    </script>
</body>
</html>
