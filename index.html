<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Labyrinthe Panoptique</title>
    <style>
        :root { 
            --bg: #0a0a0a; 
            --phone: #ffffff; 
            --text: #1a1a1a; 
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); display: flex; align-items: center; justify-content: center; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #phone-shell { 
            height: 85vh; aspect-ratio: 9 / 19; background: var(--phone); 
            border: 12px solid #1a1a1a; border-radius: 40px; 
            position: relative; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* CONTENEUR DE SCROLL VERTICAL */
        #viewport-y {
            height: 100%;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        #viewport-y::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        /* CONTENEUR DE LIGNE (HORIZONTAL) */
        .row-container {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        .viewport-x {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            width: 100%;
            height: 100%;
            scrollbar-width: none;
        }
        .viewport-x::-webkit-scrollbar { display: none; }

        /* ZONE DE TEXTE ALIGNÉE EN HAUT À GAUCHE */
        .slide { 
            min-width: 100%;
            height: 100%;
            scroll-snap-align: start;
            flex-shrink: 0;
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            text-align: left; 
            padding: 100px 35px 40px 35px; 
            box-sizing: border-box;
            color: var(--text);
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* FLÈCHES DE NAVIGATION */
        .nav-arrow { 
            position: absolute !important; 
            width: 44px; 
            height: 44px; 
            border-radius: 50%; 
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border: 1px solid #ddd;
            margin: 0 !important;
            padding: 0 !important;
            z-index: 1000;
            display: none; /* Caché par défaut */
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: background 0.2s;
        }

        .nav-arrow:hover { background: #fff; }
        .nav-arrow.visible { display: flex; }

        /* POSITIONNEMENT STRICT */
        .arrow-up { top: 20px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 20px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 15px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 15px; top: 50%; transform: translateY(-50%); }

        .ai-loading { color: #888; font-style: italic; }
    </style>
</head>
<body>

    <div id="phone-shell">
        <button id="v-up" class="nav-arrow arrow-up" onclick="moveV(-1)">↑</button>
        <button id="v-down" class="nav-arrow arrow-down" onclick="moveV(1)">↓</button>
        <div id="viewport-y"></div>
    </div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbz2c1H5uA6CLdYRYe5BsV6UkMEmsOS2MVT2cVGo00W--xIt1taP3ZTQxfNGLn63nuHe-w/exec"; 
    let globalMatrix = [];
    let curR = 0, curC = 0;

    async function askGemini(prompt, elementId) {
        try {
            const response = await fetch(`${PROXY_URL}?prompt=${encodeURIComponent(prompt)}`);
            const text = await response.text();
            document.getElementById(elementId).innerHTML = text;
        } catch (e) {
            document.getElementById(elementId).innerHTML = "Le Sphinx est fatigué, réessayez plus tard.";
        }
    }

async function askGemini(prompt, elementId) {
    const el = document.getElementById(elementId);
    const startTime = Date.now(); // Lancement du chrono
    let timerInterval;

    try {
        // Affichage initial avec chronomètre actif
        el.innerHTML = `<div class="ai-status">
            <span class="spinner"></span> 
            Le Sphinx réfléchit... <span id="timer-${elementId}">0.0s</span>
        </div>`;

        // Mise à jour du chrono toutes les 100ms
        timerInterval = setInterval(() => {
            const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
            const timerEl = document.getElementById(`timer-${elementId}`);
            if (timerEl) timerEl.innerText = elapsed + "s";
        }, 100);

        const response = await fetch(`${PROXY_URL}?prompt=${encodeURIComponent(prompt)}`, {
            method: 'GET',
            cache: 'no-cache'
        });

        const duration = ((Date.now() - startTime) / 1000).toFixed(2);
        clearInterval(timerInterval);

        if (!response.ok) {
            // Gestion des erreurs HTTP (404, 429, 503, etc.)
            const errorText = await response.text();
            throw { status: response.status, message: errorText };
        }

        const text = await response.text();
        
        // Affichage du résultat avec le temps de réponse final en petit
        el.innerHTML = `${text} <br><small style="color:#ccc; font-size:0.7rem;">(Réponse en ${duration}s)</small>`;

    } catch (e) {
        clearInterval(timerInterval);
        console.error("Erreur détaillée:", e);

        let errorMessage = "Erreur inconnue";
        let helpTip = "Réessayez dans quelques instants.";

        // Traduction des codes d'erreur pour l'utilisateur
        if (e.status === 503) {
            errorMessage = "CODE 503 : SERVEUR SATURÉ";
            helpTip = "Google reçoit trop de demandes. Le Sphinx fait la sieste, retentez sa chance dans 30 secondes.";
        } else if (e.status === 429) {
            errorMessage = "CODE 429 : QUOTA DÉPASSÉ";
            helpTip = "Trop de requêtes rapides ou plafond budgétaire atteint.";
        } else if (e.status === 404) {
            errorMessage = "CODE 404 : MODÈLE INTROUVABLE";
            helpTip = "Vérifiez le nom du modèle dans votre Google Script.";
        } else if (e.status === 400) {
            errorMessage = "CODE 400 : CLÉ API INVALIDE";
            helpTip = "Votre clé API est expirée ou mal configurée.";
        }

        el.innerHTML = `
            <div class="error-box">
                <strong>${errorMessage}</strong><br>
                <small>${helpTip}</small><br>
                <button onclick="location.reload()" style="margin-top:5px; font-size:0.7rem;">Rafraîchir la page</button>
            </div>`;
    }
}

    function moveV(dir) {
        const target = document.getElementById(`s-${curR+dir}-${curC}`);
        if(target) target.scrollIntoView({behavior:'smooth'});
    }

    function moveH(dir) {
        const target = document.getElementById(`s-${curR}-${curC+dir}`);
        if(target) target.scrollIntoView({behavior:'smooth'});
    }

    function setupObs() {
        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => {
                if(e.isIntersecting) {
                    curR = parseInt(e.target.dataset.r);
                    curC = parseInt(e.target.dataset.c);
                    updateUI();
                }
            });
        }, { root: document.querySelector('#phone-shell'), threshold: 0.6 });
        document.querySelectorAll('.slide').forEach(s => obs.observe(s));
    }

    function updateUI() {
        const check = (r, c) => globalMatrix[r] && globalMatrix[r][c] && globalMatrix[r][c].toString().trim();
        
        // Flèches verticales
        document.getElementById('v-up').classList.toggle('visible', !!check(curR-1, curC));
        document.getElementById('v-down').classList.toggle('visible', !!check(curR+1, curC));
        
        // Flèches horizontales
        document.querySelectorAll('.arrow-left, .arrow-right').forEach(a => a.classList.remove('visible'));
        const al = document.getElementById(`arr-l-${curR}`);
        const ar = document.getElementById(`arr-r-${curR}`);
        if(al) al.classList.toggle('visible', !!check(curR, curC-1));
        if(ar) ar.classList.toggle('visible', !!check(curR, curC+1));
    }

    load();
</script>
</body>
</html>
