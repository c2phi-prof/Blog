<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabyBlog - Mobile & Instant</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            background-color: #ffffff; 
            font-family: sans-serif; 
            /* Empêche le zoom accidentel sur mobile */
            touch-action: none; 
        }
        
        #main-container { width: 100vw; height: 100vh; position: relative; }

        .slide { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            display: none; 
            box-sizing: border-box; 
            padding: 10vw; /* Padding adaptatif */
        }

        .slide.active { display: flex; } 

        /* FLÈCHES ADAPTATIVES */
        .nav-arrow { 
            position: fixed; 
            background: rgba(255, 255, 255, 0.5); /* Fond léger pour mieux cliquer sur mobile */
            border: none; 
            font-size: 40px; 
            color: #000000 !important; 
            opacity: 0.15; 
            z-index: 100; 
            display: none; 
            align-items: center; 
            justify-content: center; 
            width: 60px; 
            height: 60px; 
            border-radius: 50%;
        }
        
        .nav-arrow.visible { display: flex; }
        
        .arrow-up { top: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 10px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 10px; top: 50%; transform: translateY(-50%); }
        
        .content { 
            max-width: 1100px; 
            width: 100%; 
            line-height: 1.6; 
            font-size: 1.2rem; /* Texte plus grand par défaut */
        }

        /* AJUSTEMENTS MOBILE (Écrans < 768px) */
        @media (max-width: 768px) {
            .content { font-size: 1.1rem; }
            .nav-arrow { 
                width: 80px; /* Plus grandes cibles tactiles */
                height: 80px; 
                font-size: 50px; 
                opacity: 0.3; /* Plus visibles sur mobile */
            }
            .slide { padding: 15vw 10vw; }
        }
    </style>
</head>
<body>

<button id="v-up" class="nav-arrow arrow-up" onclick="moveDir(-1, 0)">▲</button>
<button id="v-down" class="nav-arrow arrow-down" onclick="moveDir(1, 0)">▼</button>
<button id="h-left" class="nav-arrow arrow-left" onclick="moveDir(0, -1)">◀</button>
<button id="h-right" class="nav-arrow arrow-right" onclick="moveDir(0, 1)">▶</button>

<div id="main-container"></div>

<script>
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";
    let globalMatrix = [];
    let currentR = 0, currentC = 0;

    // GESTION DU TOUCHER (SWIPE)
    let touchstartX = 0;
    let touchstartY = 0;

    window.addEventListener('touchstart', e => {
        touchstartX = e.changedTouches[0].screenX;
        touchstartY = e.changedTouches[0].screenY;
    }, false);

    window.addEventListener('touchend', e => {
        const touchendX = e.changedTouches[0].screenX;
        const touchendY = e.changedTouches[0].screenY;
        handleGesture(touchendX, touchendY);
    }, false);

    function handleGesture(endX, endY) {
        const dx = endX - touchstartX;
        const dy = endY - touchstartY;
        // Seuil pour éviter les clics accidentels
        if (Math.abs(dx) > Math.abs(dy)) {
            if (Math.abs(dx) > 50) dx > 0 ? moveDir(0, -1) : moveDir(0, 1);
        } else {
            if (Math.abs(dy) > 50) dy > 0 ? moveDir(-1, 0) : moveDir(1, 0);
        }
    }

    async function load() {
        try {
            const res = await fetch(PROXY_URL);
            globalMatrix = await res.json();
            render();
        } catch (e) { console.error("Erreur:", e); }
    }

    function moveDir(r, c) {
        const nextR = currentR + r;
        const nextC = currentC + c;
        if (globalMatrix[nextR] && globalMatrix[nextR][nextC]) {
            const currentSlide = document.querySelector('.slide.active');
            if (currentSlide) currentSlide.classList.remove('active');
            currentR = nextR;
            currentC = nextC;
            const nextSlide = document.getElementById(`s-${currentR}-${currentC}`);
            if (nextSlide) nextSlide.classList.add('active');
            updateArrows(currentR, currentC);
        }
    }

    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell) {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    if (rIdx === 0 && cIdx === 0) slide.classList.add('active');
                    slide.id = `s-${rIdx}-${cIdx}`;
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    contentDiv.innerHTML = cell.htmlContent;
                    slide.style.backgroundColor = cell.backgroundColor;
                    const hA = (cell.horizontalAlignment || "").toUpperCase();
                    const vA = (cell.verticalAlignment || "").toUpperCase();
                    slide.style.justifyContent = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "flex-end" : "flex-start";
                    slide.style.alignItems = vA.includes("MIDDLE") ? "center" : vA.includes("BOTTOM") ? "flex-end" : "flex-start";
                    contentDiv.style.textAlign = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "right" : "left";
                    slide.appendChild(contentDiv);
                    container.appendChild(slide);
                }
            });
        });
        updateArrows(0, 0);
    }

    function updateArrows(r, c) {
        const hasCell = (row, col) => {
            if (row < 0 || col < 0) return false;
            return globalMatrix[row] && globalMatrix[row][col] !== null;
        };
        document.getElementById('v-up').style.display = hasCell(r - 1, c) ? 'flex' : 'none';
        document.getElementById('v-down').style.display = hasCell(r + 1, c) ? 'flex' : 'none';
        document.getElementById('h-left').style.display = hasCell(r, c - 1) ? 'flex' : 'none';
        document.getElementById('h-right').style.display = hasCell(r, c + 1) ? 'flex' : 'none';
        document.querySelectorAll('.nav-arrow').forEach(btn => {
            if (btn.style.display === 'flex') btn.classList.add('visible');
            else btn.classList.remove('visible');
        });
    }

    load();
</script>
</body>
</html>
