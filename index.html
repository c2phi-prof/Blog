<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LabyBlog v4.1 - Markdown Hybrid (Loader 4.2.5)</title>
    <!-- Import du parseur Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: 'Inter', sans-serif; touch-action: none; }
        #main-container { width: 100vw; height: 100vh; position: relative; }
        
        /* --- SPLASH SCREEN 4.2.5 --- */
        #loader {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #fff; display: flex; align-items: center; justify-content: center; z-index: 2000;
            transition: opacity 0.4s ease;
        }
        .data-engine { display: flex; align-items: center; width: 450px; font-family: 'Inconsolata', monospace; font-size: 13px; color: #000; }
        .data-slot { width: 150px; overflow: hidden; white-space: nowrap; text-transform: uppercase; letter-spacing: 1px; }
        #slot-left { text-align: right; padding-right: 20px; font-weight: 700; }
        #slot-right { text-align: left; padding-left: 20px; }
        .track { flex-grow: 1; height: 1px; background: #f0f0f0; position: relative; }
        #progress-line { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: #000; transition: width 0.3s cubic-bezier(0.1, 0.5, 0.5, 1); }

        /* --- INTERFACE --- */
        .slide { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: none; box-sizing: border-box; padding: 40px; overflow-y: auto; touch-action: pan-y; }
        .slide.active { display: flex; } 
        .nav-arrow { position: fixed; background: rgba(255, 255, 255, 0.3); border: none; font-size: 40px; color: #000; z-index: 100; display: none; align-items: center; justify-content: center; width: 60px; height: 60px; border-radius: 50%; opacity: 0; transition: opacity 0.8s ease; }
        .nav-arrow.visible { display: flex; opacity: 0.15; } 
        .arrow-up { top: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-down { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .arrow-left { left: 10px; top: 50%; transform: translateY(-50%); }
        .arrow-right { right: 10px; top: 50%; transform: translateY(-50%); }
        #outline-panel { position: fixed; top: 0; left: -420px; width: 400px; height: 100%; background: #fcfcfc; box-shadow: 2px 0 15px rgba(0,0,0,0.1); z-index: 1000; transition: left 0.4s; overflow-y: auto; padding: 15px; box-sizing: border-box; }
        #outline-panel.open { left: 0; }
        .outline-header { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #ddd; padding-bottom: 15px; margin-bottom: 20px; }
        #matrix-minimap { display: grid; gap: 1px; background: #eee; border: 1px solid #bbb; padding: 2px; width: 40px; height: 40px; }
        .map-dot { width: 100%; height: 100%; background-color: #fff; }
        .map-dot.occupied { background-color: #777; cursor: pointer; }
        .tool-btn { width: 40px; height: 40px; background: #fff; border: 1px solid #bbb; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #777; }
        #outline-content { display: flex; flex-direction: column; gap: 2px; }
        .outline-item { cursor: pointer; padding: 8px 12px; border-left: 3px solid #ddd; background-color: #f0f0f0; font-size: 0.65rem; color: #444; }
        .content { width: 100%; line-height: 1.4; font-size: 1.2rem; }
        .content h1, .content h2, .content h3 { margin-top: 0; line-height: 1.2; }
        .content table { border-collapse: collapse; width: 100%; margin: 10px 0; }
        .content td, .content th { border: 1px solid #ddd; padding: 8px; }
        a { color: inherit; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body onclick="handleGlobalClick(event)">

<div id="loader">
    <div class="data-engine">
        <div id="slot-left" class="data-slot">Ø</div>
        <div class="track"><div id="progress-line"></div></div>
        <div id="slot-right" class="data-slot"></div>
    </div>
</div>

<div id="outline-panel">
    <div class="outline-header">
        <div id="matrix-minimap"></div>
        <div class="header-tools" style="display:flex; gap:10px;">
            <button class="tool-btn" title="Exporter" onclick="exportAndCopy()">⭳</button>
            <button class="tool-btn" title="Importer" onclick="smartImport()">⭱</button>
            <button class="tool-btn" title="Rétro-Matriçage" onclick="exportToSheet()">◈</button>
            <input type="file" id="import-input" style="display:none" onchange="importMatrixFile(event)">
        </div>
    </div>
    <div id="outline-content"></div>
</div>

<button id="v-up" class="nav-arrow arrow-up" onclick="moveDir(-1, 0, event)">▲</button>
<button id="v-down" class="nav-arrow arrow-down" onclick="moveDir(1, 0, event)">▼</button>
<button id="h-left" class="nav-arrow arrow-left" onclick="moveDir(0, -1, event)">◀</button>
<button id="h-right" class="nav-arrow arrow-right" onclick="moveDir(0, 1, event)">▶</button>

<div id="main-container"></div>

<script>
    const HTML_VERSION = "4.1";
    const PROXY_URL = "https://script.google.com/macros/s/AKfycbyh6DHFtArE5EhPoz3bC9nwp_Fbuv4q_AA-7ICpl8LUMnAJiUrWqc6B_BQDNrVYCtLskQ/exec";
    let globalMatrix = [], currentSheetName = "", currentR = 0, currentC = 0;
    let clickCount = 0, clickTimer = null, arrowTimer = null, lastTapTime = 0;

    marked.setOptions({ gfm: true, breaks: true, sanitize: false });

    async function load(name = "") {
        const loader = document.getElementById('loader');
        const bar = document.getElementById('progress-line');
        const sLeft = document.getElementById('slot-left');
        const sRight = document.getElementById('slot-right');

        loader.style.display = 'flex';
        loader.style.opacity = '1';
        bar.style.width = "10%";
        sLeft.innerText = "Ø";

        try {
            const url = name ? `${PROXY_URL}?sheet=${encodeURIComponent(name)}` : PROXY_URL;
            const res = await fetch(url);
            bar.style.width = "40%";

            const data = await res.json();
            
            // Extraction des tokens réels du JSON
            const rawText = JSON.stringify(data).replace(/[^a-zA-ZÀ-ÿ]/g, ' ');
            const tokens = rawText.split(/\s+/).filter(t => t.length > 4);

            let i = 0;
            const flash = setInterval(() => {
                if (i < tokens.length) {
                    sLeft.innerText = tokens[i] || "";
                    sRight.innerText = tokens[i+1] || "";
                    i += 2;
                }
            }, 80);

            currentSheetName = data.sheetName;
            globalMatrix = data.matrix;
            render(); buildOutline();
            
            bar.style.width = "100%";
            clearInterval(flash);

            // Métadonnées finales réelles
            sLeft.innerText = "STRATE:" + data.sheetName.toUpperCase();
            sRight.innerText = "VER:" + data.version;

            setTimeout(() => {
                const loadTime = performance.now();
                console.log(`%c [SYSTEM] Matrice installée en ${(loadTime / 1000).toFixed(2)}s`, "color: #00ff00; font-weight: bold;");
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            }, 600);

            if(!name) window.jumpTo(0, 0);
        } catch (e) { 
            console.error(e);
            sLeft.innerText = "ERR";
            sRight.innerText = "CONX";
        }
    }

    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = "";
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                if (cell) {
                    const slide = document.createElement('div');
                    slide.className = 'slide';
                    if (rIdx === currentR && cIdx === currentC) slide.classList.add('active');
                    slide.id = `s-${rIdx}-${cIdx}`;
                    
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'content';
                    contentDiv.innerHTML = marked.parse(cell.htmlContent);
                    
                    slide.style.backgroundColor = cell.backgroundColor;
                    const hA = (cell.horizontalAlignment || "").toUpperCase();
                    const vA = (cell.verticalAlignment || "").toUpperCase();
                    slide.style.justifyContent = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "flex-end" : "flex-start";
                    slide.style.alignItems = vA.includes("MIDDLE") ? "center" : vA.includes("BOTTOM") ? "flex-end" : "flex-start";
                    contentDiv.style.textAlign = hA.includes("CENTER") ? "center" : hA.includes("RIGHT") ? "right" : "left";
                    
                    slide.appendChild(contentDiv);
                    container.appendChild(slide);
                }
            });
        });
        updateArrows(currentR, currentC);
    }

    window.jumpTo = function(r, c) {
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
        currentR = r; currentC = c;
        const target = document.getElementById(`s-${r}-${c}`);
        if (target) { target.classList.add('active'); target.scrollTop = 0; updateArrows(r, c); }
    };

    function moveDir(r, c, e) {
        if (e) e.stopPropagation();
        const nR = currentR + r, nC = currentC + c;
        if (globalMatrix[nR] && globalMatrix[nR][nC]) window.jumpTo(nR, nC);
    }

    function updateArrows(r, c) {
        const has = (row, col) => globalMatrix[row] && globalMatrix[row][col];
        const cfg = {'v-up': has(r-1,c), 'v-down': has(r+1,c), 'h-left': has(r,c-1), 'h-right': has(r,c+1)};
        for (let id in cfg) { 
            const btn = document.getElementById(id);
            if(btn) { btn.dataset.exists = !!cfg[id]; btn.style.display = cfg[id] ? 'flex' : 'none'; }
        }
        showArrows();
    }

    function handleGlobalClick(e) {
        if (e.target.closest('#outline-panel') || e.target.classList.contains('nav-arrow')) return;
        showArrows(); 
        const now = Date.now();
        if (now - lastTapTime < 300) clickCount = 0; else clickCount++;
        lastTapTime = now;
        clearTimeout(clickTimer);
        clickTimer = setTimeout(() => { clickCount = 0; }, 1200);
        if (clickCount >= 5) { document.getElementById('outline-panel').classList.toggle('open'); clickCount = 0; }
    }

    function showArrows() {
        const arrows = document.querySelectorAll('.nav-arrow');
        arrows.forEach(a => { if (a.dataset.exists === "true") a.classList.add('visible'); });
        clearTimeout(arrowTimer);
        arrowTimer = setTimeout(() => { arrows.forEach(a => a.classList.remove('visible')); }, 3000); 
    }

    async function exportToSheet() {
        try {
            const res = await fetch(PROXY_URL, { method: 'POST', body: JSON.stringify({ sheetName: currentSheetName, matrix: globalMatrix }) });
            alert(await res.text());
        } catch (e) { alert("Erreur Rétro-Matriçage"); }
    }

    function buildOutline() {
        const content = document.getElementById('outline-content');
        const minimap = document.getElementById('matrix-minimap');
        content.innerHTML = ""; minimap.innerHTML = "";
        minimap.style.gridTemplateColumns = `repeat(${globalMatrix[0].length}, 1fr)`;
        globalMatrix.forEach((row, rIdx) => {
            row.forEach((cell, cIdx) => {
                const dot = document.createElement('div');
                if (cell) {
                    dot.className = "map-dot occupied";
                    const item = document.createElement('div');
                    item.className = "outline-item";
                    item.style.marginLeft = (cIdx * 20) + "px";
                    const temp = document.createElement("div"); temp.innerHTML = cell.htmlContent;
                    item.innerText = temp.innerText.trim().substring(0, 50);
                    item.onclick = () => { window.jumpTo(rIdx, cIdx); document.getElementById('outline-panel').classList.remove('open'); };
                    content.appendChild(item);
                } else dot.className = "map-dot";
                minimap.appendChild(dot);
            });
        });
    }

    load();
</script>
</body>
</html>
